<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>crackable</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     CONFIG — change these two lines
     ------------------------------------------------------------
     OWNER_PASSCODE : type this after tapping the logo 5 times
                      to open the owner dashboard.
     FORMSPREE_URL  : paste a free Formspree form URL here to get
                      a real email every time someone submits.
                      (Sign up at formspree.io, leave "" to skip.)
     ============================================================ */

  :root{
    --ink:#170824;
    --ink-2:#22103a;
    --card:#2a1547;
    --cream:#fdeffb;
    --muted:#b79bd6;
    --cool:#34e0d4;
    --warm:#ff2e88;
    --line:rgba(253,239,251,.12);
    --glow:#ff2e88;
  }

  *{box-sizing:border-box;margin:0;padding:0}

  body{
    font-family:'Space Grotesk',sans-serif;
    background:
      radial-gradient(1200px 600px at 50% -10%, #3a1860 0%, transparent 60%),
      var(--ink);
    color:var(--cream);
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    overflow-x:hidden;
  }

  .stage{width:100%;max-width:480px}

  /* ---- logo ---- */
  .logo{
    font-family:'Syne',sans-serif;
    font-weight:800;
    font-size:clamp(40px,12vw,64px);
    letter-spacing:-.03em;
    text-align:center;
    line-height:.95;
    cursor:pointer;
    user-select:none;
    background:linear-gradient(92deg,var(--cool),var(--warm));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    transition:transform .15s;
  }
  .logo:active{transform:scale(.97)}
  .logo .crack{position:relative}
  .tag{
    text-align:center;
    color:var(--muted);
    font-size:14px;
    margin-top:8px;
    letter-spacing:.02em;
  }

  /* ---- card ---- */
  .card{
    background:linear-gradient(180deg, var(--card), var(--ink-2));
    border:1px solid var(--line);
    border-radius:24px;
    padding:26px 22px 24px;
    margin-top:26px;
    box-shadow:0 30px 80px -40px rgba(255,46,136,.5);
  }

  label.q{
    display:block;
    font-family:'Syne',sans-serif;
    font-weight:700;
    font-size:18px;
    margin-bottom:10px;
  }
  .field{margin-bottom:20px}
  input[type=text]{
    width:100%;
    background:rgba(253,239,251,.05);
    border:1px solid var(--line);
    color:var(--cream);
    font-family:inherit;
    font-size:16px;
    padding:13px 15px;
    border-radius:13px;
    outline:none;
    transition:border-color .2s, background .2s;
  }
  input[type=text]::placeholder{color:#7e639e}
  input[type=text]:focus{border-color:var(--warm);background:rgba(255,46,136,.06)}

  /* ---- intention tiles ---- */
  .options{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .opt{
    position:relative;
    border:1px solid var(--line);
    background:rgba(253,239,251,.04);
    border-radius:14px;
    padding:14px 12px;
    cursor:pointer;
    text-align:left;
    color:var(--cream);
    font-family:inherit;
    transition:transform .12s, border-color .2s, background .2s;
  }
  .opt:hover{transform:translateY(-2px)}
  .opt .emoji{font-size:22px;display:block;margin-bottom:6px}
  .opt .name{font-family:'Syne',sans-serif;font-weight:700;font-size:15px}
  .opt .lvl{font-size:11px;color:var(--muted);margin-top:2px}
  .opt[aria-pressed="true"]{
    border-color:var(--sel,var(--warm));
    background:color-mix(in srgb, var(--sel,var(--warm)) 14%, transparent);
    box-shadow:0 0 0 1px var(--sel,var(--warm)) inset;
  }

  /* ---- heat gauge (signature element) ---- */
  .gauge-wrap{margin:22px 0 6px}
  .gauge-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .gauge-head .read{
    font-family:'Syne',sans-serif;font-weight:800;font-size:15px;
    color:var(--read,#7e639e);transition:color .3s;
  }
  .gauge-head .pct{font-size:12px;color:var(--muted)}
  .gauge{
    height:14px;border-radius:99px;
    background:rgba(253,239,251,.07);
    overflow:hidden;position:relative;
  }
  .fill{
    height:100%;width:0%;border-radius:99px;
    background:linear-gradient(90deg,var(--cool),var(--warm));
    transition:width .5s cubic-bezier(.2,.9,.2,1);
    box-shadow:0 0 18px var(--glow);
  }
  .reaction{
    min-height:22px;margin-top:12px;font-size:14px;color:var(--cream);
    opacity:0;transform:translateY(4px);transition:.3s;
  }
  .reaction.show{opacity:1;transform:none}

  /* ---- submit ---- */
  .go{
    width:100%;margin-top:20px;
    border:none;border-radius:14px;
    padding:15px;font-family:'Syne',sans-serif;font-weight:800;font-size:17px;
    color:#fff;cursor:pointer;
    background:linear-gradient(92deg,var(--cool),var(--warm));
    transition:transform .12s, filter .2s, opacity .2s;
  }
  .go:hover{filter:brightness(1.08)}
  .go:active{transform:scale(.98)}
  .go:disabled{opacity:.45;cursor:not-allowed}

  .err{color:#ff8fb4;font-size:13px;margin-top:10px;min-height:16px}

  /* ---- result screen ---- */
  .result{display:none;text-align:center;padding:10px 4px}
  .result.show{display:block;animation:pop .4s ease}
  @keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
  .result .big{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;margin:6px 0}
  .chem{
    font-family:'Syne',sans-serif;font-weight:800;
    font-size:54px;line-height:1;margin:14px 0 4px;
    background:linear-gradient(92deg,var(--cool),var(--warm));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .result p{color:var(--muted);font-size:14px;margin:6px 0}
  .again{
    margin-top:18px;background:none;border:1px solid var(--line);
    color:var(--cream);border-radius:12px;padding:11px 18px;
    font-family:inherit;font-size:14px;cursor:pointer;
  }
  .again:hover{border-color:var(--warm)}

  /* ---- owner dashboard ---- */
  .dash{display:none}
  .dash.show{display:block;animation:pop .35s ease}
  .dash h2{font-family:'Syne',sans-serif;font-size:20px;margin-bottom:4px}
  .dash .sub{color:var(--muted);font-size:13px;margin-bottom:14px}
  .row{
    border:1px solid var(--line);border-radius:12px;
    padding:12px 14px;margin-bottom:9px;
    display:flex;justify-content:space-between;align-items:center;gap:10px;
  }
  .row .who{font-family:'Syne',sans-serif;font-weight:700;font-size:15px}
  .row .meta{font-size:12px;color:var(--muted);margin-top:2px}
  .pill{
    font-size:12px;font-weight:700;padding:5px 10px;border-radius:99px;white-space:nowrap;
  }
  .dash-actions{display:flex;gap:10px;margin-top:14px}
  .dash-actions button{
    flex:1;border-radius:11px;padding:11px;font-family:inherit;font-size:13px;cursor:pointer;
    border:1px solid var(--line);background:none;color:var(--cream);
  }
  .dash-actions .danger{border-color:#ff8fb4;color:#ff8fb4}
  .empty{color:var(--muted);font-size:14px;text-align:center;padding:24px 0}

  /* ---- heart burst ---- */
  .heart{position:fixed;font-size:22px;pointer-events:none;z-index:50;
    animation:rise 1.1s ease-out forwards}
  @keyframes rise{
    0%{transform:translateY(0) scale(.6);opacity:1}
    100%{transform:translateY(-160px) scale(1.3);opacity:0}
  }

  .foot{text-align:center;color:#6c5288;font-size:11px;margin-top:18px}

  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
</style>
</head>
<body>
<div class="stage">

  <div class="logo" id="logo">crack<span class="crack">able</span></div>
  <div class="tag" id="tag">tap in. what are you really here for?</div>

  <!-- MAIN FORM -->
  <div class="card" id="formCard">
    <div class="field">
      <label class="q" for="name">First, who are you?</label>
      <input type="text" id="name" placeholder="your name" maxlength="40" autocomplete="off">
    </div>

    <div class="field">
      <label class="q" for="target">Who's this about? <span style="color:var(--muted);font-weight:400;font-size:13px">(optional)</span></label>
      <input type="text" id="target" placeholder="a name, or leave it a mystery" maxlength="40" autocomplete="off">
    </div>

    <div class="field">
      <label class="q">Your intentions are…</label>
      <div class="options" id="options"></div>
    </div>

    <div class="gauge-wrap">
      <div class="gauge-head">
        <span class="read" id="read">pick one</span>
        <span class="pct" id="pct">heat 0%</span>
      </div>
      <div class="gauge"><div class="fill" id="fill"></div></div>
      <div class="reaction" id="reaction"></div>
    </div>

    <button class="go" id="go" disabled>Lock it in</button>
    <div class="err" id="err"></div>
  </div>

  <!-- RESULT -->
  <div class="card result" id="result">
    <div class="big" id="resTitle">Locked in 💥</div>
    <p>Your chemistry reading:</p>
    <div class="chem" id="chem">—</div>
    <p id="resMsg"></p>
    <button class="again" id="again">Go again</button>
  </div>

  <!-- OWNER DASHBOARD -->
  <div class="card dash" id="dash">
    <h2>Owner inbox</h2>
    <div class="sub" id="dashSub"></div>
    <div id="rows"></div>
    <div class="dash-actions">
      <button id="export">Copy all</button>
      <button id="close">Close</button>
      <button class="danger" id="clear">Clear all</button>
    </div>
  </div>

  <div class="foot">made with crackable · responses save on this device</div>
</div>

<script>
  /* ===== CONFIG ===== */
  const OWNER_PASSCODE = "owner";   // tap the logo 5x, then type this
  const FORMSPREE_URL  = "";        // e.g. "https://formspree.io/f/abcdwxyz" for real email alerts

  /* ===== intention tiers (a real intensity spectrum) ===== */
  const TIERS = [
    {key:"friends",   label:"Friends",    emoji:"🫶", lvl:"just vibes",      pct:25,  color:"#34e0d4",
     react:"Wholesome. Respect.", res:"Solid friend energy. The realest tier, honestly."},
    {key:"friends+",  label:"Friends+",   emoji:"😏", lvl:"…the plus is doing work", pct:50, color:"#9b8bff",
     react:"The plus is carrying a lot of weight here.", res:"Mysterious. We'll allow it."},
    {key:"making out",label:"Making out", emoji:"💋", lvl:"bold of you", pct:75, color:"#ff7ab8",
     react:"Okay okay, stating your case.", res:"Confident. Points for clarity."},
    {key:"cracking",  label:"Cracking",   emoji:"🔥", lvl:"all gas no brakes", pct:100, color:"#ff2e88",
     react:"Absolutely no notes. Bold. 🔥", res:"Maximum heat. Noted and respected."},
  ];

  const $ = id => document.getElementById(id);
  let selected = null;

  /* build option tiles */
  const optBox = $("options");
  TIERS.forEach((t,i)=>{
    const b = document.createElement("button");
    b.className = "opt";
    b.type = "button";
    b.setAttribute("aria-pressed","false");
    b.style.setProperty("--sel", t.color);
    b.innerHTML = `<span class="emoji">${t.emoji}</span>
                   <span class="name">${t.label}</span>
                   <span class="lvl">${t.lvl}</span>`;
    b.addEventListener("click",()=>select(i));
    optBox.appendChild(b);
  });

  function select(i){
    selected = i;
    const t = TIERS[i];
    [...optBox.children].forEach((el,j)=>el.setAttribute("aria-pressed", j===i));
    $("fill").style.width = t.pct + "%";
    document.documentElement.style.setProperty("--glow", t.color);
    $("read").textContent = t.label.toLowerCase();
    $("read").style.setProperty("--read", t.color);
    $("pct").textContent = "heat " + t.pct + "%";
    const r = $("reaction");
    r.textContent = t.react;
    r.classList.add("show");
    validate();
  }

  function validate(){
    const ok = $("name").value.trim().length > 0 && selected !== null;
    $("go").disabled = !ok;
    if(ok) $("err").textContent = "";
    return ok;
  }
  $("name").addEventListener("input",validate);

  /* ===== storage ===== */
  const KEY = "crackable_responses";
  const load = ()=>{ try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return[]} };
  const save = list => localStorage.setItem(KEY, JSON.stringify(list));

  /* ===== submit ===== */
  $("go").addEventListener("click", async ()=>{
    if(!validate()){
      $("err").textContent = "Add your name and pick a tier first.";
      return;
    }
    const t = TIERS[selected];
    const entry = {
      name: $("name").value.trim(),
      target: $("target").value.trim() || "—",
      intention: t.key,
      label: t.label,
      heat: t.pct,
      at: new Date().toISOString()
    };

    const list = load(); list.push(entry); save(list);
    burst();

    // optional real notification
    if(FORMSPREE_URL){
      try{
        await fetch(FORMSPREE_URL,{
          method:"POST",
          headers:{"Accept":"application/json","Content-Type":"application/json"},
          body:JSON.stringify(entry)
        });
      }catch(e){/* offline is fine, it's saved locally */}
    }

    // chemistry reading: deterministic-ish fun number, biased up by heat
    const base = 40 + Math.floor(Math.random()*45);
    const chem = Math.min(99, Math.round(base*0.6 + t.heat*0.4));
    $("chem").textContent = chem + "%";
    $("resTitle").textContent = `${entry.name} → ${t.label} ${t.emoji}`;
    $("resMsg").textContent = t.res;
    $("formCard").style.display = "none";
    $("result").classList.add("show");
  });

  $("again").addEventListener("click",()=>{
    $("result").classList.remove("show");
    $("formCard").style.display = "block";
    $("name").value=""; $("target").value="";
    selected=null;
    [...optBox.children].forEach(el=>el.setAttribute("aria-pressed","false"));
    $("fill").style.width="0%"; $("read").textContent="pick one";
    $("read").style.setProperty("--read","#7e639e");
    $("pct").textContent="heat 0%"; $("reaction").classList.remove("show");
    $("go").disabled=true;
  });

  /* ===== heart burst ===== */
  function burst(){
    const hearts=["💥","💖","🔥","✨","💘"];
    for(let i=0;i<14;i++){
      const h=document.createElement("div");
      h.className="heart";
      h.textContent=hearts[Math.floor(Math.random()*hearts.length)];
      h.style.left=(40+Math.random()*20)+"%";
      h.style.top="55%";
      h.style.animationDelay=(Math.random()*0.25)+"s";
      document.body.appendChild(h);
      setTimeout(()=>h.remove(),1300);
    }
  }

  /* ===== owner dashboard (tap logo 5x → passcode) ===== */
  let taps=0, tapTimer=null;
  $("logo").addEventListener("click",()=>{
    taps++; clearTimeout(tapTimer);
    tapTimer=setTimeout(()=>taps=0,1200);
    if(taps>=5){
      taps=0;
      const code=prompt("Owner passcode:");
      if(code===OWNER_PASSCODE) openDash();
      else if(code!==null) alert("Nope.");
    }
  });

  function pillColor(key){ return (TIERS.find(t=>t.key===key)||{}).color || "#9b8bff"; }

  function openDash(){
    $("formCard").style.display="none";
    $("result").classList.remove("show");
    $("dash").classList.add("show");
    const list=load().slice().reverse();
    $("dashSub").textContent = list.length+" response"+(list.length===1?"":"s")+
      (FORMSPREE_URL?" · email alerts on":" · device only");
    const rows=$("rows");
    if(!list.length){ rows.innerHTML='<div class="empty">No responses yet.</div>'; return; }
    rows.innerHTML="";
    list.forEach(e=>{
      const d=new Date(e.at);
      const div=document.createElement("div");
      div.className="row";
      div.innerHTML=`<div>
          <div class="who">${esc(e.name)}</div>
          <div class="meta">about ${esc(e.target)} · ${d.toLocaleDateString()} ${d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>
        </div>
        <span class="pill" style="background:${pillColor(e.intention)}22;color:${pillColor(e.intention)}">${esc(e.label)}</span>`;
      rows.appendChild(div);
    });
  }
  function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}

  $("close").addEventListener("click",()=>{
    $("dash").classList.remove("show");
    $("formCard").style.display="block";
  });
  $("clear").addEventListener("click",()=>{
    if(confirm("Delete all responses on this device?")){ save([]); openDash(); }
  });
  $("export").addEventListener("click",()=>{
    const txt=load().map(e=>`${e.name} → ${e.label} (about ${e.target}) @ ${e.at}`).join("\n")||"(empty)";
    navigator.clipboard?.writeText(txt).then(
      ()=>alert("Copied all responses."),
      ()=>alert(txt)
    );
  });
</script>
</body>
</html>
